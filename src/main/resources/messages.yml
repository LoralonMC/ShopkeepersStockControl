# ============================================================
# SHOPKEEPERS STOCK CONTROL - MESSAGES
# ============================================================
# https://docs.advntr.dev/minimessage/format.html
#
# Player trade placeholders:
#   <time_remaining> - Countdown until reset (e.g. "23h 45m", "6d 12h")
#   <reset_time>     - Reset time display (e.g. "00:00", "Monday 00:00")
#   <remaining>      - Number of trades remaining for the player
#   <max>            - Maximum number of trades allowed
#
# Command placeholders:
#   <player>, <shop>, <trade>, <count>, <used>, <max>, <remaining>, <cooldown>
#   <name>, <id>, <enabled>, <mode>, <time>, <day>, <cap>, <key>, <details>
#
# Set text to "" to disable individual messages.

# ============================================================
# GAMEPLAY MESSAGES
# ============================================================
# These messages support display routing (chat or action_bar).
trade-limit-reached:
  text: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#C27B6B>You've reached your limit! <#f2ebd7>Cooldown: <#FCD472><time_remaining> <#f2ebd7>(Resets at <#FCD472><reset_time><#f2ebd7>)"
  display: chat
trades-remaining:
  text: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#f2ebd7>Trades remaining: <#FCD472><remaining><#f2ebd7>/<#FCD472><max>"
  display: action_bar
cooldown-active:
  text: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#D89B6A>Cooldown active. <#FCD472><time_remaining> <#f2ebd7>(Resets at <#FCD472><reset_time><#f2ebd7>)"
  display: action_bar

# ============================================================
# COMMAND MESSAGES
# ============================================================
# Flat strings, always delivered via chat.
commands:
  # --- Help ---
  help:
    - "<#6B7A5E>=== ShopkeepersStockControl Commands ==="
    - "<#FCD472>/ssc reload <#f2ebd7>- Reload configuration"
    - "<#FCD472>/ssc reset <player> [shop] [trade] <#f2ebd7>- Reset trade data"
    - "<#FCD472>/ssc check <player> [shop] [trade] <#f2ebd7>- Check remaining trades"
    - "<#FCD472>/ssc restock <shop> [trade] <#f2ebd7>- Restock a shared shop"
    - "<#FCD472>/ssc info <shop> <#f2ebd7>- Show shop configuration details"
    - "<#FCD472>/ssc debug <#f2ebd7>- Toggle debug mode"
    - "<#FCD472>/ssc cleanup <#f2ebd7>- Manually trigger cleanup"
    - "<#FCD472>/ssc help <#f2ebd7>- Show this help message"
  # --- Reload ---
  reload-start: "<#D89B6A>Reloading configuration..."
  reload-success: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Configuration reloaded successfully!"
  reload-failed: "<#6C757D>[<#C27B6B>ᴇʀʀᴏʀ<#6C757D>] <#C27B6B>Failed to reload configuration. Check console for errors."
  # --- Debug ---
  debug-enabled: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#f2ebd7>Debug mode <#8FAA87>enabled"
  debug-disabled: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#f2ebd7>Debug mode <#D89B6A>disabled"
  # --- Cleanup ---
  cleanup-start: "<#D89B6A>Running manual cleanup..."
  cleanup-complete: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Cleanup complete! Removed <#FCD472><count> <#8FAA87>expired entries."
  # --- Errors ---
  error-player-not-found: "<#6C757D>[<#C27B6B>ᴇʀʀᴏʀ<#6C757D>] <#C27B6B>Player not found: <#FCD472><player>"
  error-shop-not-found: "<#6C757D>[<#C27B6B>ᴇʀʀᴏʀ<#6C757D>] <#C27B6B>Shop not found: <#FCD472><shop>"
  error-trade-not-found: "<#6C757D>[<#C27B6B>ᴇʀʀᴏʀ<#6C757D>] <#C27B6B>Trade not found: <#FCD472><trade> <#C27B6B>in shop <#FCD472><shop>"
  error-not-shared: "<#6C757D>[<#C27B6B>ᴇʀʀᴏʀ<#6C757D>] <#C27B6B>Shop <#FCD472><shop> <#C27B6B>is not in shared stock mode. Use <#FCD472>/ssc reset <#C27B6B>for per-player shops."
  # --- Reset ---
  reset-player: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Reset all trades for player <#FCD472><player>"
  reset-player-shop: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Reset trades for player <#FCD472><player> <#8FAA87>in shop <#FCD472><shop>"
  reset-player-shop-trade: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Reset trade <#FCD472><trade> <#8FAA87>for player <#FCD472><player> <#8FAA87>in shop <#FCD472><shop>"
  # --- Restock ---
  restock-shop: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Restocked all trades in shop <#FCD472><shop>"
  restock-trade: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#8FAA87>Restocked trade <#FCD472><trade> <#8FAA87>in shop <#FCD472><shop>"
  # --- Check (no-data warnings) ---
  check-no-data: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#D89B6A>Player <#FCD472><player> <#D89B6A>has no trade data."
  check-no-data-shop: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#D89B6A>Player <#FCD472><player> <#D89B6A>has no trades in shop <#FCD472><shop><#D89B6A>."
  check-no-data-trade: "<#6C757D>[<#6B7A5E>ꜱʜᴏᴘ<#6C757D>] <#D89B6A>Player <#FCD472><player> <#D89B6A>has no data for trade <#FCD472><trade><#D89B6A>."
  # --- Check (display output) ---
  check-header: "<#6B7A5E>=== Trade data for <#FCD472><player> <#6B7A5E>==="
  check-shop: "<#f2ebd7>Shop: <#FCD472><shop>"
  check-trade: "<#f2ebd7>  Trade: <#FCD472><trade>"
  check-used: "<#f2ebd7>  Used: <#FCD472><used><#6C757D>/<#FCD472><max>"
  check-remaining: "<#f2ebd7>  Remaining: <#FCD472><remaining>"
  check-cooldown-never: "<#f2ebd7>  Cooldown: <#D89B6A>Never (manual restock)"
  check-cooldown-active: "<#f2ebd7>  Cooldown: <#FCD472><cooldown>"
  check-cooldown-ready: "<#f2ebd7>  Cooldown: <#8FAA87>Ready"
  # --- Info (display output) ---
  info-header: "<#6B7A5E>=== Shop Info: <#FCD472><name> <#6B7A5E>==="
  info-id: "<#f2ebd7>ID: <#FCD472><id>"
  info-enabled: "<#f2ebd7>Enabled: <#FCD472><enabled>"
  info-stock-mode: "<#f2ebd7>Stock Mode: <#FCD472><mode>"
  info-cooldown-mode: "<#f2ebd7>Cooldown Mode: <#FCD472><mode>"
  info-reset-time: "<#f2ebd7>Reset Time: <#FCD472><time>"
  info-reset-day: "<#f2ebd7>Reset Day: <#FCD472><day>"
  info-per-player-cap: "<#f2ebd7>Default Per-Player Cap: <#FCD472><cap>"
  info-trades-count: "<#f2ebd7>Trades: <#FCD472><count>"
  info-trade-entry: "<#6C757D>  - <#FCD472><key> <#6C757D>(<details>)"
