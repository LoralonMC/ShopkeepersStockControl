name: ShopkeepersStockControl
version: '${version}'
main: dev.oakheart.stockcontrol.ShopkeepersStockControl
description: 'A Shopkeepers addon that enables per-player trade limits with accurate stock display.'
api-version: '1.21.10'
authors:
  - Loralon
website: https://github.com/LoralonMC/ShopkeepersStockControl
dependencies:
  server:
    Shopkeepers:
      load: BEFORE
      required: true
    packetevents:
      load: BEFORE
      required: true
    PlaceholderAPI:
      load: BEFORE
      required: false
permissions:
  shopkeepersstock.*:
    description: 'All ShopkeepersStockControl permissions'
    default: op
    children:
      shopkeepersstock.reload: true
      shopkeepersstock.reset: true
      shopkeepersstock.check: true
      shopkeepersstock.restock: true
      shopkeepersstock.info: true
      shopkeepersstock.debug: true
      shopkeepersstock.cleanup: true
      shopkeepersstock.rotation: true
      shopkeepersstock.admin: true
      shopkeepersstock.help: true
  shopkeepersstock.reload:
    description: 'Reload configuration'
    default: op
  shopkeepersstock.reset:
    description: 'Reset player trade data'
    default: op
  shopkeepersstock.check:
    description: 'Check player trade data'
    default: op
  shopkeepersstock.restock:
    description: 'Restock shared-mode shops'
    default: op
  shopkeepersstock.info:
    description: 'View shop configuration'
    default: op
  shopkeepersstock.debug:
    description: 'Toggle debug mode'
    default: op
  shopkeepersstock.cleanup:
    description: 'Trigger expired data cleanup'
    default: op
  shopkeepersstock.rotation:
    description: 'View and force rotation pool advances'
    default: op
  shopkeepersstock.admin:
    description: 'Admin diagnostics and stress testing (/ssc diag, /ssc stress)'
    default: op
  shopkeepersstock.help:
    description: 'View command help'
    default: op
